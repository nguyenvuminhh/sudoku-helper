name: Deploy Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - supabase/migrations/**
      - .github/workflows/supabase-migrations.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-migrations-production
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
      SUPABASE_AUTH_SITE_URL: ${{ vars.SUPABASE_AUTH_SITE_URL }}
      SUPABASE_AUTH_REDIRECT_URLS: ${{ vars.SUPABASE_AUTH_REDIRECT_URLS }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Ensure Supabase config exists
        run: |
          if [ ! -f supabase/config.toml ]; then
            supabase init
          fi

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Configure Supabase Auth URLs
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          base_path="${NEXT_PUBLIC_BASE_PATH:-/$repo_name}"
          base_path="/${base_path#/}"
          base_path="${base_path%/}"

          if [ "$base_path" = "/" ]; then
            default_site_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/"
          else
            default_site_url="https://${GITHUB_REPOSITORY_OWNER}.github.io${base_path}/"
          fi

          site_url="${SUPABASE_AUTH_SITE_URL:-$default_site_url}"
          required_redirect_urls="$site_url,http://localhost:3000/**,http://127.0.0.1:3000/**"
          if [ -n "$SUPABASE_AUTH_REDIRECT_URLS" ]; then
            required_redirect_urls="$required_redirect_urls,$SUPABASE_AUTH_REDIRECT_URLS"
          fi

          current_config="$(mktemp)"
          request_body="$(mktemp)"
          response_body="$(mktemp)"

          curl -fsS -o "$current_config" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/config/auth" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"

          uri_allow_list="$(
            jq -r --arg required "$required_redirect_urls" '
              def urls:
                if type == "array" then map(tostring)
                elif type == "string" then split(",")
                else [] end
                | map(gsub("^\\s+|\\s+$"; ""))
                | map(select(length > 0));
              (((.uri_allow_list // "") | urls) + ($required | urls) | unique | join(","))
            ' "$current_config"
          )"

          jq -n \
            --arg site_url "$site_url" \
            --arg uri_allow_list "$uri_allow_list" \
            '{site_url: $site_url, uri_allow_list: $uri_allow_list}' > "$request_body"

          curl -fsS -o "$response_body" -X PATCH \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/config/auth" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary "@$request_body"

          jq -e --arg site_url "$site_url" '
            def urls:
              if type == "array" then map(tostring)
              elif type == "string" then split(",")
              else [] end
              | map(gsub("^\\s+|\\s+$"; ""))
              | map(select(length > 0));
            .site_url == $site_url and (((.uri_allow_list // "") | urls) | index($site_url))
          ' "$response_body" > /dev/null

          echo "Configured Supabase Auth site URL: $site_url"

      - name: Push database migrations
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --yes
