name: Deploy Frontend To GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/frontend-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Resolve Supabase public URL
        if: ${{ env.NEXT_PUBLIC_SUPABASE_URL == '' }}
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "Missing NEXT_PUBLIC_SUPABASE_URL variable or SUPABASE_PROJECT_ID secret." >&2
            exit 1
          fi
          echo "NEXT_PUBLIC_SUPABASE_URL=https://${SUPABASE_PROJECT_ID}.supabase.co" >> "$GITHUB_ENV"
      - name: Resolve Supabase publishable key
        if: ${{ env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY == '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "Missing NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY variable or Supabase management secrets." >&2
            exit 1
          fi
          publishable_key="$(
            curl -fsS "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/api-keys" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" |
              jq -r 'map(select(.type == "publishable"))[0].api_key // map(select(.name == "anon"))[0].api_key // empty'
          )"
          if [ -z "$publishable_key" ]; then
            echo "Unable to resolve a Supabase publishable or anon key." >&2
            exit 1
          fi
          echo "::add-mask::$publishable_key"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$publishable_key" >> "$GITHUB_ENV"
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
