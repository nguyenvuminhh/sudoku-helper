<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sudoku strategy desk · Minimal redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
<style>
  :root { --font-sans: "Inter", system-ui, sans-serif; --font-serif: "Fraunces", Georgia, serif; }

  /* ---------- Shell + theme tokens ---------- */
  .shell {
    --paper:#fbfcf8; --ink:#1b1f24; --muted:#6a727c; --faint:#9aa2ab;
    --line:#e7eae5; --line-soft:#eef1ec;
    --panel-elev:#ffffff; --track:#eef1ec; --field:#ffffff;
    --teal:#0c8f93; --teal-deep:#066b70; --teal-soft:#e6f3f1;
    --user:#2563b0;
    --cell-bg:#ffffff; --cell-line:#e3e7e1; --box-line:#c2c9bf; --board-edge:#c2c9bf;
    --sel-bg:#dcefe9; --sel-ring:#0c8f93; --peer-bg:#f1f5f1;
    --hint-primary:#ffeaa3; --hint-related:#e1ecfb;
    --shadow-sm:0 1px 2px rgba(25,33,38,.06);
    font-family:var(--font-sans); color:var(--ink); background:var(--paper);
    height:100%; width:100%; display:flex; flex-direction:column;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .shell[data-theme="dark"] {
    --paper:#0f141a; --ink:#e7ecf1; --muted:#9aa6b1; --faint:#6c7884;
    --line:#222c34; --line-soft:#1b232b;
    --panel-elev:#161d24; --track:#1b232b; --field:#141b22;
    --teal:#2bb7af; --teal-deep:#74dad0; --teal-soft:#13302d;
    --user:#7cb1f4;
    --cell-bg:#141b22; --cell-line:#222c34; --box-line:#36424c; --board-edge:#36424c;
    --sel-bg:#123b35; --sel-ring:#2bb7af; --peer-bg:#19212a;
    --hint-primary:#5a4f1d; --hint-related:#1f344b;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  }
  .shell *, .phone * { box-sizing:border-box; }
  .shell button { font:inherit; cursor:pointer; }

  /* ---------- Top bar ---------- */
  .top {
    flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:22px 30px 14px;
  }
  .brand { display:flex; align-items:center; gap:11px; }
  .brand-mark { width:20px; height:20px; border-radius:6px; background:var(--teal);
    box-shadow:inset 0 0 0 3px var(--paper), 0 0 0 1px var(--teal); flex:0 0 auto; }
  .brand-name { font-family:var(--font-serif); font-size:1.3rem; font-weight:600; letter-spacing:-.01em; white-space:nowrap; }
  .theme-pill {
    display:inline-flex; align-items:center; gap:7px; height:34px; padding:0 13px;
    border:1px solid var(--line); border-radius:999px; background:transparent;
    color:var(--muted); font-size:.82rem; font-weight:600;
  }

  /* ---------- Stage ---------- */
  .stage { flex:1 1 auto; display:grid; grid-template-columns:minmax(0,1fr) 332px;
    gap:30px; padding:6px 30px 28px; min-height:0; align-items:start; }
  .board-col { display:flex; flex-direction:column; align-items:center; justify-content:flex-start; min-width:0; }
  .board-stack { display:flex; flex-direction:column; align-items:center; gap:14px; max-width:100%; }
  .board-status { width:100%; display:flex; align-items:center;
    justify-content:space-between; color:var(--muted); font-size:.82rem; font-weight:600;
    font-variant-numeric:tabular-nums; }
  .board-status span { display:inline-flex; align-items:center; gap:6px; }
  .bs-ok { color:var(--teal-deep); }

  /* ---------- Board ---------- */
  .sb-board { display:grid; grid-template-columns:repeat(9,1fr); grid-template-rows:repeat(9,1fr);
    background:var(--cell-bg); border:2px solid var(--board-edge); border-radius:10px;
    overflow:hidden; user-select:none; box-shadow:var(--shadow-sm); }
  .sb-board.ghost { box-shadow:none; }
  .cell { position:relative; container-type:size; display:grid; place-items:center;
    background:var(--cell-bg); border-right:1px solid var(--cell-line); border-bottom:1px solid var(--cell-line); }
  .cell:nth-child(3n):not(:nth-child(9n)) { border-right:2px solid var(--box-line); }
  .cell:nth-child(9n) { border-right:0; }
  .cell:nth-child(n+73) { border-bottom:0; }
  .cell:nth-child(n+19):nth-child(-n+27), .cell:nth-child(n+46):nth-child(-n+54) { border-bottom:2px solid var(--box-line); }
  .cell strong { grid-area:1/1; font-family:var(--font-sans); font-weight:600; line-height:1;
    font-size:clamp(13px,56cqh,30px); }
  .cell strong.given { color:var(--ink); }
  .cell strong.user { color:var(--user); }
  .ghost .cell strong { opacity:.25; }
  .cell.peer { background:var(--peer-bg); }
  .cell.hint-related { background:var(--hint-related); }
  .cell.hint-primary { background:var(--hint-primary); }
  .cell.sel { background:var(--sel-bg); box-shadow:inset 0 0 0 2px var(--sel-ring); z-index:1; }
  .corner-notes { grid-area:1/1; display:grid; grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr); width:88%; height:88%; color:var(--faint);
    font-size:clamp(6px,19cqh,11px); font-weight:700; line-height:1; }
  .corner-notes span { display:flex; align-items:center; justify-content:center; }

  /* ---------- Keypad ---------- */
  .sb-keypad { width:100%; display:grid; grid-template-columns:repeat(10,1fr); gap:7px; }
  .sb-keypad.mini { gap:5px; }
  .key { position:relative; min-height:46px; border:1px solid var(--line); border-radius:9px;
    background:var(--panel-elev); color:var(--ink); display:grid; place-items:center; }
  .sb-keypad.mini .key { min-height:40px; }
  .key-d { font-size:1.05rem; font-weight:700; }
  .key-r { position:absolute; right:5px; bottom:3px; font-size:.55rem; font-weight:800; color:var(--faint); }
  .key.active { background:var(--teal); border-color:var(--teal); color:#fff; }
  .key.active .key-r { color:rgba(255,255,255,.85); }
  .key.erase { color:var(--muted); }

  /* ---------- Entry toolbar ---------- */
  .entry-bar { width:100%; display:flex; align-items:stretch; gap:6px;
    padding:5px; background:var(--track); border-radius:12px; }
  .eb-group { display:flex; gap:4px; }
  .eb-group.modes { flex:1; }
  .eb-div { width:1px; background:var(--line); margin:4px 2px; }
  .eb-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    min-width:42px; padding:6px 8px; border:0; border-radius:8px; background:transparent; color:var(--muted); }
  .eb-btn.mode { flex:1; }
  .eb-btn span { font-size:.6rem; font-weight:700; }
  .eb-btn:hover { color:var(--ink); }
  .eb-btn.on { background:var(--panel-elev); color:var(--teal-deep); box-shadow:var(--shadow-sm); }
  .eb-btn.more { color:var(--faint); }

  /* ---------- Panel ---------- */
  .panel-col { min-width:0; }
  .panel { display:flex; flex-direction:column; gap:16px; }
  .panel-head { display:flex; flex-direction:column; gap:6px; align-items:flex-start; }
  .panel-head h2 { margin:0; font-family:var(--font-serif); font-weight:600; font-size:1.4rem; letter-spacing:-.01em; white-space:nowrap; }
  .panel-head .sub { margin:0; color:var(--muted); font-size:.88rem; line-height:1.45; }

  .seg { display:flex; gap:3px; padding:3px; background:var(--track); border-radius:11px; }
  .seg-btn { flex:1; border:0; border-radius:8px; padding:8px 10px; background:transparent;
    color:var(--muted); font-size:.84rem; font-weight:600; }
  .seg-btn.on { background:var(--panel-elev); color:var(--ink); box-shadow:var(--shadow-sm); }

  .field-group { display:flex; flex-direction:column; gap:9px; }
  .fld-row { display:flex; align-items:center; justify-content:space-between; }
  .fld-label { color:var(--muted); font-size:.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.04em; }
  .count { font-size:.74rem; font-weight:800; color:var(--faint); }
  .count.ok { color:var(--teal-deep); }
  .chips { display:flex; flex-wrap:wrap; gap:7px; }
  .chip { padding:7px 13px; border:1px solid var(--line); border-radius:999px;
    font-size:.82rem; font-weight:600; color:var(--muted); }
  .chip.on { border-color:var(--teal); background:var(--teal-soft); color:var(--teal-deep); }
  .code-field { font-family:"SFMono-Regular",ui-monospace,Menlo,monospace; font-size:.72rem;
    line-height:1.7; color:var(--muted); background:var(--field); border:1px solid var(--line);
    border-radius:9px; padding:11px 12px; word-break:break-all; letter-spacing:.02em; }

  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; height:44px;
    padding:0 16px; border-radius:10px; font-size:.9rem; font-weight:600; border:1px solid transparent; }
  .btn.full { width:100%; }
  .btn.sm { height:38px; font-size:.84rem; }
  .btn.primary { background:var(--teal); border-color:var(--teal); color:#fff; }
  .btn.ghost { background:transparent; border-color:var(--line); color:var(--ink); }
  .btn-row { display:grid; gap:8px; }
  .btn-row.two { grid-template-columns:1fr 1fr; }
  .hint-line { margin:0; color:var(--faint); font-size:.8rem; line-height:1.4; }

  .dropzone { display:flex; align-items:center; justify-content:center; gap:9px; padding:13px;
    border:1.5px dashed var(--line); border-radius:10px; color:var(--muted); font-size:.82rem; font-weight:500; }

  .pill { display:inline-flex; align-items:center; padding:4px 11px; border-radius:999px;
    font-size:.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.04em; }
  .pill-teal { background:var(--teal-soft); color:var(--teal-deep); }
  .mini-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:0; }
  .mini-stats > div { display:flex; flex-direction:column; gap:3px; padding:11px 12px;
    background:var(--field); border:1px solid var(--line); border-radius:10px; }
  .mini-stats dt { color:var(--muted); font-size:.66rem; font-weight:800; text-transform:uppercase; letter-spacing:.04em; }
  .mini-stats dd { margin:0; font-size:1.15rem; font-weight:700; font-variant-numeric:tabular-nums; }

  .strategy { display:flex; flex-direction:column; gap:8px; }
  .strategy-label { display:inline-flex; align-items:center; gap:7px; color:var(--muted);
    font-size:.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.04em; white-space:nowrap; }
  .strategy-text { margin:0; color:var(--ink); font-size:1rem; line-height:1.5; }

  .disclosure { display:flex; flex-direction:column; }
  .disc-row { display:flex; align-items:center; justify-content:space-between; width:100%;
    padding:13px 2px; border:0; border-top:1px solid var(--line); background:transparent;
    color:var(--muted); font-size:.88rem; font-weight:600; }
  .disc-row:hover { color:var(--ink); }
  .disc-l { display:inline-flex; align-items:center; gap:9px; }
  .disc-c { background:var(--teal-soft); color:var(--teal-deep); font-size:.72rem; font-weight:800;
    padding:2px 8px; border-radius:999px; }

  /* ---------- Mobile layout ---------- */
  .shell.mobile .top { padding:16px 18px 10px; }
  .shell.mobile .brand-name { font-size:1.12rem; }
  .shell.mobile .stage { grid-template-columns:1fr; gap:14px; padding:0 16px 16px; }
  .shell.mobile .board-stack { width:100% !important; }
  .shell.mobile .sb-board { width:100% !important; height:auto !important; aspect-ratio:1; }
  .shell.mobile .panel-col { margin-top:2px; }
  .shell.mobile .panel { background:var(--panel-elev); border:1px solid var(--line);
    border-radius:18px; padding:16px; box-shadow:0 -1px 0 var(--line); gap:13px; }
  .shell.mobile .panel-head h2 { font-size:1.2rem; }
  .shell.mobile .disclosure { display:none; }
  .shell.mobile .strategy-text { font-size:.92rem; }
  .shell.mobile .eb-btn { min-width:0; padding:8px 4px; }
  .shell.mobile .eb-btn span { display:none; }
  .shell.mobile .eb-div { margin:4px 1px; }

  /* ---------- Phone frame ---------- */
  .phone { background:#0a0c0f; border-radius:42px; padding:11px; position:relative;
    box-shadow:0 30px 60px rgba(20,28,33,.22), inset 0 0 0 2px #23272c; }
  .phone-screen { position:relative; width:100%; height:100%; border-radius:32px; overflow:hidden; background:#fff; }
  .phone-notch { position:absolute; top:11px; left:50%; transform:translateX(-50%);
    width:120px; height:26px; background:#0a0c0f; border-radius:0 0 16px 16px; z-index:5; }

  /* ---------- Rationale card ---------- */
  .readme { height:100%; background:#fff; padding:40px 44px; font-family:var(--font-sans);
    color:#1b1f24; display:flex; flex-direction:column; gap:18px; overflow:hidden; }
  .readme h1 { margin:0; font-family:var(--font-serif); font-weight:600; font-size:1.9rem; letter-spacing:-.02em; }
  .readme .lede { margin:0; color:#5d6570; font-size:1rem; line-height:1.55; max-width:62ch; }
  .readme h3 { margin:8px 0 0; font-size:.74rem; font-weight:800; text-transform:uppercase;
    letter-spacing:.05em; color:#0c8f93; }
  .readme ul { margin:0; padding-left:0; list-style:none; display:grid; gap:9px; max-width:64ch; }
  .readme li { position:relative; padding-left:20px; color:#2f3940; font-size:.92rem; line-height:1.5; }
  .readme li::before { content:""; position:absolute; left:0; top:.55em; width:7px; height:7px;
    border-radius:2px; background:#0c8f93; }
  .readme li b { font-weight:700; color:#1b1f24; }
  .readme .cols { display:grid; grid-template-columns:1fr 1fr; gap:28px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="board.jsx"></script>
<script type="text/babel" src="panel.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function Readme() {
  return (
    <div className="readme">
      <h1>Sudoku strategy desk — calmer redesign</h1>
      <p className="lede">Same engine, same features — presented quietly. The board becomes the
        centerpiece, the busy sidebar collapses into one panel that changes with what you’re doing,
        and the grid-paper texture, card borders and accent strips are gone.</p>
      <div className="cols">
        <div>
          <h3>What changed</h3>
          <ul>
            <li><b>One contextual panel</b> replaces the stack of Generate / Load / Strategy / Hint / History / Settings cards.</li>
            <li><b>Less chrome:</b> flat paper, no grid texture, hairline dividers instead of bordered cards.</li>
            <li><b>Fewer visible tools</b> while solving — Normal / Corner / Center / Color up front, the rest behind ⋯ More.</li>
            <li><b>Teal earns its place:</b> primary action, active tool and selected cell only.</li>
          </ul>
        </div>
        <div>
          <h3>What stayed</h3>
          <ul>
            <li>Every feature: generate, import-by-image, notes, colors, hints, history, shortcuts.</li>
            <li>The <b>Inter</b> number font you like, and a single quiet <b>Fraunces</b> title.</li>
            <li>Light &amp; dark, fully responsive to a phone bottom-sheet.</li>
          </ul>
          <h3>The flow →</h3>
          <ul>
            <li>Start → Import → Review &amp; confirm → Solving.</li>
          </ul>
        </div>
      </div>
    </div>
  );
}

const DESK_W = 1040, DESK_H = 720;
const PHONE_W = 384, PHONE_H = 788;

function Desk({ phase, theme }) {
  const size = phase === "solving" ? 414 : 452;
  return <AppShell phase={phase} theme={theme} boardSize={size} />;
}

function Mobile({ phase, theme }) {
  return (
    <PhoneFrame w={362} h={766}>
      <AppShell phase={phase} theme={theme} mobile boardSize={phase === "solving" ? 286 : 300} />
    </PhoneFrame>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="readme" title="Read me" subtitle="Direction & rationale">
        <DCArtboard id="rationale" label="Design rationale" width={760} height={DESK_H}>
          <Readme />
        </DCArtboard>
      </DCSection>

      <DCSection id="desk-light" title="Entry flow · Desktop" subtitle="Light — the four beats from empty board to solving">
        <DCArtboard id="dl-start" label="1 · Start (generate)" width={DESK_W} height={DESK_H}><Desk phase="start" theme="light" /></DCArtboard>
        <DCArtboard id="dl-import" label="2 · Import" width={DESK_W} height={DESK_H}><Desk phase="import" theme="light" /></DCArtboard>
        <DCArtboard id="dl-review" label="3 · Review & confirm" width={DESK_W} height={DESK_H}><Desk phase="review" theme="light" /></DCArtboard>
        <DCArtboard id="dl-solve" label="4 · Solving" width={DESK_W} height={DESK_H}><Desk phase="solving" theme="light" /></DCArtboard>
      </DCSection>

      <DCSection id="desk-dark" title="Entry flow · Desktop" subtitle="Dark — same beats, equally polished">
        <DCArtboard id="dd-start" label="1 · Start (generate)" width={DESK_W} height={DESK_H}><Desk phase="start" theme="dark" /></DCArtboard>
        <DCArtboard id="dd-import" label="2 · Import" width={DESK_W} height={DESK_H}><Desk phase="import" theme="dark" /></DCArtboard>
        <DCArtboard id="dd-review" label="3 · Review & confirm" width={DESK_W} height={DESK_H}><Desk phase="review" theme="dark" /></DCArtboard>
        <DCArtboard id="dd-solve" label="4 · Solving" width={DESK_W} height={DESK_H}><Desk phase="solving" theme="dark" /></DCArtboard>
      </DCSection>

      <DCSection id="mobile" title="Responsive · Mobile" subtitle="Panel becomes a bottom sheet">
        <DCArtboard id="m-start" label="Start (light)" width={PHONE_W} height={PHONE_H}><Mobile phase="start" theme="light" /></DCArtboard>
        <DCArtboard id="m-review" label="Review (light)" width={PHONE_W} height={PHONE_H}><Mobile phase="review" theme="light" /></DCArtboard>
        <DCArtboard id="m-solve" label="Solving (light)" width={PHONE_W} height={PHONE_H}><Mobile phase="solving" theme="light" /></DCArtboard>
        <DCArtboard id="m-solve-d" label="Solving (dark)" width={PHONE_W} height={PHONE_H}><Mobile phase="solving" theme="dark" /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
